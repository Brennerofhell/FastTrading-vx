license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
description='''Adds a button to the villager trading GUI to repeat the current trade until it's no longer available (again).'''
authors="ADudeCalledLeo, bendy1234, Brennerofhell"
displayURL="https://github.com/Brennerofhell/FastTrading-vx"
issueTrackerURL="https://github.com/Brennerofhell/FastTrading-vx/issues"

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="CLIENT"
